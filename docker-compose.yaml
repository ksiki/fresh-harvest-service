x-common-env: &common-env
  X_API_KEY: ${X_API_KEY}
  DEBUG: ${DEBUG}

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: fh-db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./.data/.postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fh-rabbitmq
    hostname: my-rabbit
    volumes:
      - ./.data/.rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: fh-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - ./.data/.minio_data:/data

  api-service:
    build:
      context: .
      dockerfile: api-service/Dockerfile
    container_name: fh-api
    volumes:
      - ./api-service/src:/app/src
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      DATABASE_SCHEMA: ${DATABASE_SCHEMA}
      YANDEX_MAPS_API_KEY: ${YANDEX_MAPS_API_KEY}
      PYTHONPATH: /app
      <<: *common-env
    working_dir: /app/src
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  tg-service:
    build:
      context: ./tg-service
      dockerfile: Dockerfile
    container_name: fh-bot
    volumes:
      - ./tg-service/bot:/app/bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      WEB_APP_URL: ${WEB_APP_URL}
      <<: *common-env
    working_dir: /app/bot
    command: python -m run
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
